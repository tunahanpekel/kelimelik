name: kelimelik
description: "Kelimelik — Multi-mode Turkish word game app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Backend
  supabase_flutter: ^2.5.6

  # Local storage
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4

  # Ads
  google_mobile_ads: ^5.3.1
  app_tracking_transparency: ^2.0.4

  # Analytics / Crash
  firebase_core: ^3.6.0
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3

  # HTTP (TDK API)
  http: ^1.2.1

  # Storage
  shared_preferences: ^2.5.5

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  gap: ^3.0.1

  # Share
  share_plus: ^9.0.0
  url_launcher: ^6.3.2

  # Utils
  intl: "0.20.2"
  package_info_plus: ^9.0.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.7
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/fonts/
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash.png
  android_12:
    color: "#FFFFFF"
    image: assets/images/splash.png

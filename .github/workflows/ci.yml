name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2.23.0
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: source/frontend
        run: flutter pub get

      - name: Generate code
        working-directory: source/frontend
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        working-directory: source/frontend
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  test:
    name: Flutter Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [analyze]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2.23.0
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: source/frontend
        run: flutter pub get

      - name: Generate code
        working-directory: source/frontend
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        working-directory: source/frontend
        run: flutter test --no-pub --reporter=compact --coverage --test-randomize-ordering-seed random

  build-check:
    name: Android Debug Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2.23.0
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@7a6d8a8234af8eb26422e24e3006232cccaa061b  # v4.6.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Write local.properties
        working-directory: source/frontend
        run: |
          printf 'sdk.dir=%s
' "$ANDROID_SDK_ROOT" >> android/local.properties
          printf 'ndk.dir=%s/ndk/28.2.13676358
' "$ANDROID_SDK_ROOT" >> android/local.properties
          printf 'flutter.sdk=%s
' "$(dirname $(dirname $(which flutter)))" >> android/local.properties

      - name: Install dependencies
        working-directory: source/frontend
        run: flutter pub get

      - name: Generate code
        working-directory: source/frontend
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        working-directory: source/frontend
        run: |
          flutter build apk --debug \
            --dart-define=APP_ENV=dev \
            --dart-define=SUPABASE_URL=https://mock.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=mock_key
